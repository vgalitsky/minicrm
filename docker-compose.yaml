services:

  nginx:
    image: nginx:alpine
    container_name: minicrm_nginx
    ports:
      - "80:80"
    volumes:
      - ./laravel:/var/www/html
      - ./packages:/var/www/packages
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: ./docker/php
    container_name: minicrm_app
    working_dir: /var/www/html
    volumes:
      - ./env:/var/env
      - ./laravel:/var/www/html
      - ./packages:/var/www/packages
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f artisan && php artisan --version"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:17-alpine
    container_name: minicrm_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minicrm}
      POSTGRES_USER: ${POSTGRES_USER:-minicrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minicrm} -d ${POSTGRES_DB:-minicrm} -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: minicrm_pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minicrm.loc
      PGADMIN_DEFAULT_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: